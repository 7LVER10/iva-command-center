services:
  - type: web
    name: iva-command-center
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/iva.db
    disk:
      name: ivadata
      mountPath: /var/data
      sizeGB: 1
